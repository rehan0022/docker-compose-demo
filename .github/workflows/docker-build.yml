name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Debug Secrets
        run: |
          echo "Checking secrets..."
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "❌ USERNAME missing"; else echo "✅ USERNAME present"; fi
          if [ -z "${{ secrets.DOCKER_TOKEN }}" ]; then echo "❌ TOKEN missing"; else echo "✅ TOKEN present"; fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: rehanahmed076/myapp:latest
